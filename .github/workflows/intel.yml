name: 竞品情报自动收集
# ============================================================
# GitHub Actions 定时工作流配置
# ============================================================
# 这个文件放到 GitHub 仓库的 .github/workflows/ 目录下
# 会每天北京时间 08:00 自动执行
# ============================================================

on:
  schedule:
    # cron 表达式：分 时 日 月 周（UTC 时区）
    # '0 0 * * *' = UTC 00:00 = 北京时间 08:00
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许在 GitHub 页面手动触发

jobs:
  collect-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行竞品情报收集
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WECHAT_WORK_WEBHOOK: ${{ secrets.WECHAT_WORK_WEBHOOK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python competitive_intel.py

      - name: 保存报告到仓库
        run: |
          git config user.name "Competitive Intel Bot"
          git config user.email "bot@users.noreply.github.com"
          git add reports/
          git commit -m "📊 竞品情报日报 - $(date -u +%Y-%m-%d)" || exit 0
          git push
